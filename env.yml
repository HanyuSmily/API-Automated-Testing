# 环境配置文件：定义各测试环境的 base_url 与数据库连接信息
# 通过环境变量 TEST_ENV 切换环境（dev / qa / prod），未设置时使用 default

# 默认环境（TEST_ENV 未设置时使用）
default: dev

environments:
  # 开发环境
  dev:
    base_url: https://dev-api.example.com
    db:
      host: 127.0.0.1
      port: 3306
      user: dev_user
      password: dev_pass
      database: api_test_dev
    redis:
      host: 127.0.0.1
      port: 6379
      db: 0

  # 测试环境
  qa:
    base_url: https://qa-api.example.com
    db:
      host: 192.168.1.100
      port: 3306
      user: qa_user
      password: qa_pass
      database: api_test_qa
    redis:
      host: 192.168.1.101
      port: 6379
      db: 1

  # 生产环境
  prod:
    base_url: https://api.example.com
    db:
      host: 10.0.1.100
      port: 3306
      user: prod_user
      password: prod_pass
      database: api_test_prod
    redis:
      host: 10.0.1.101
      port: 6379
      db: 2
