# ============================================================
# 环境配置文件
# 切换环境方式（优先级从高到低）：
#   1. 环境变量 TEST_ENV=mock / dev / qa / prod
#   2. 本文件中的 default 字段
# ============================================================

# 默认环境
default: mock

environments:
  # ========================================================
  # Mock 环境（本地 FastAPI Mock 服务器）
  # ========================================================
  mock:
    base_url: http://127.0.0.1:8080

    # 数据库配置（Mock 环境用内存存储，这里保留占位）
    db:
      host: 127.0.0.1
      port: 3306
      user: root
      password: 123456
      database: mall_mock

    # Redis 配置
    redis:
      host: 127.0.0.1
      port: 6379
      db: 0

    # 测试账号
    accounts:
      admin:
        username: admin
        password: "123456"
      member:
        username: testuser
        password: "123456"

    # Mock 服务专属配置
    mock:
      server_port: 8080
      auto_start: false

  # ========================================================
  # 开发环境（远端真实服务）
  # ========================================================
  dev:
    base_url: https://dev-mall-api.example.com

    db:
      host: 192.168.1.10
      port: 3306
      user: dev_mall
      password: DevMall@2024
      database: mall_dev

    redis:
      host: 192.168.1.11
      port: 6379
      db: 0

    accounts:
      admin:
        username: admin
        password: "admin123"
      member:
        username: testuser
        password: "test123456"

  # ========================================================
  # 测试环境
  # ========================================================
  qa:
    base_url: https://qa-mall-api.example.com

    db:
      host: 192.168.2.10
      port: 3306
      user: qa_mall
      password: QaMall@2024
      database: mall_qa

    redis:
      host: 192.168.2.11
      port: 6379
      db: 1

    accounts:
      admin:
        username: admin
        password: "admin@qa"
      member:
        username: testuser
        password: "test@qa123"

  # ========================================================
  # 生产环境（只读，禁止写操作）
  # ========================================================
  prod:
    base_url: https://mall-api.example.com

    db:
      host: 10.0.1.100
      port: 3306
      user: readonly
      password: "ReadOnly@2024"
      database: mall_prod

    redis:
      host: 10.0.1.101
      port: 6379
      db: 2

    accounts:
      admin:
        username: auditor
        password: "Audit@2024"
      member:
        username: prod_testuser
        password: "ProdTest@2024"

# ============================================================
# 全局配置（所有环境共享，可被环境级配置覆盖）
# ============================================================
global:
  # 请求超时时间（秒）
  request_timeout: 30

  # 重试配置
  retry:
    max_attempts: 3
    interval: 2

  # 日志配置
  log:
    level: INFO
    file: logs/api_test.log

  # 报告配置
  report:
    allure_dir: reports/allure_results
    html_dir: reports
    screenshot_on_failure: true
