[pytest]
# -p no:langsmith: 禁用 langsmith 插件避免 pydantic v2 导入冲突
# --html --self-contained-html: 自动生成单文件 HTML 报告（CSS/JS 内联，便于分享）
# --alluredir: 生成 Allure 原始数据（需 allure CLI 渲染最终报告）
addopts =
    -p no:langsmith
    --html=reports/report.html
    --self-contained-html
    --alluredir=reports/allure_data
    --clean-alluredir
testpaths = .
# 添加警告过滤
filterwarnings =
    ignore::pytest.PytestCollectionWarning
# 标记注册
markers =
    smoke: 冒烟测试 - 核心主链路，每次提交必跑
    regression: 回归测试 - 全量用例集
    exception: 异常/边界场景测试
    e2e: 端到端全链路测试
    ums: UMS 会员模块测试
    pms: PMS 商品模块测试
    oms: OMS 订单模块测试
    sms: SMS 营销模块测试
    coupon: 优惠券相关测试
    refund: 退款/逆向流程测试
    idempotent: 幂等性测试
    dataconsistency: 数据一致性/白盒校验测试
    api: 接口测试
    env: 环境管理测试
    assert: 断言能力测试
    debugtalk: 全局 Hook 测试
    params: 数据驱动测试
